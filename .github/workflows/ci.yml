name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & Format
        run: pnpm check

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm test:coverage

      - name: Upload coverage reports to Codecov
        if: matrix.node-version == 24
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: CLI smoke test (standalone)
        run: pnpm run test:smoke

  bun-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Test (Bun)
        run: bunx --bun vitest run

  deno-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test (Deno)
        run: deno run -A packages/zod-aot/tests/compat.mjs

  zod-compat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zod-version: ["4.0.0", "4.1.0", "4.2.0", "4.3.0", "latest"]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Override Zod to ${{ matrix.zod-version }}
        run: pnpm --filter zod-aot exec pnpm add -D zod@${{ matrix.zod-version }} --no-lockfile

      - name: Test
        run: pnpm test
